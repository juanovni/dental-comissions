services:
    dental.app:
        build:
            context: .
            dockerfile: Dockerfile.easypanel
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: dental-commissions/app:easypanel-8.4
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            APP_NAME: '${APP_NAME:-Dental Commissions MVP}'
            APP_ENV: '${APP_ENV:-production}'
            APP_KEY: '${APP_KEY:?APP_KEY is required}'
            APP_DEBUG: '${APP_DEBUG:-false}'
            APP_URL: '${APP_URL:?APP_URL is required}'
            APP_LOCALE: '${APP_LOCALE:-es}'
            APP_FALLBACK_LOCALE: '${APP_FALLBACK_LOCALE:-en}'
            APP_FAKER_LOCALE: '${APP_FAKER_LOCALE:-es_ES}'
            LOG_CHANNEL: '${LOG_CHANNEL:-stack}'
            LOG_STACK: '${LOG_STACK:-single}'
            LOG_LEVEL: '${LOG_LEVEL:-info}'
            DB_CONNECTION: pgsql
            DB_HOST: '${DB_HOST:-dental.pgsql}'
            DB_PORT: '${DB_PORT:-5432}'
            DB_DATABASE: '${DB_DATABASE:-dental_commissions_mvp}'
            DB_USERNAME: '${DB_USERNAME:-dental}'
            DB_PASSWORD: '${DB_PASSWORD:?DB_PASSWORD is required}'
            SESSION_DRIVER: '${SESSION_DRIVER:-database}'
            SESSION_LIFETIME: '${SESSION_LIFETIME:-120}'
            CACHE_STORE: '${CACHE_STORE:-database}'
            QUEUE_CONNECTION: '${QUEUE_CONNECTION:-database}'
            BROADCAST_CONNECTION: '${BROADCAST_CONNECTION:-log}'
            FILESYSTEM_DISK: '${FILESYSTEM_DISK:-local}'
            MAIL_MAILER: '${MAIL_MAILER:-log}'
            MAIL_FROM_ADDRESS: '${MAIL_FROM_ADDRESS:-hello@example.com}'
            MAIL_FROM_NAME: '${MAIL_FROM_NAME:-Dental Commissions MVP}'
            WHATSAPP_API_URL: '${WHATSAPP_API_URL:-https://graph.facebook.com/v19.0}'
            WHATSAPP_PHONE_NUMBER_ID: '${WHATSAPP_PHONE_NUMBER_ID:?WHATSAPP_PHONE_NUMBER_ID is required}'
            WHATSAPP_ACCESS_TOKEN: '${WHATSAPP_ACCESS_TOKEN:?WHATSAPP_ACCESS_TOKEN is required}'
            WHATSAPP_VERIFY_TOKEN: '${WHATSAPP_VERIFY_TOKEN:?WHATSAPP_VERIFY_TOKEN is required}'
            WHATSAPP_APP_SECRET: '${WHATSAPP_APP_SECRET:?WHATSAPP_APP_SECRET is required}'
            OPENAI_API_KEY: '${OPENAI_API_KEY:?OPENAI_API_KEY is required}'
            OPENAI_MODEL: '${OPENAI_MODEL:-gpt-4o-mini}'
        volumes:
            - dental-storage:/var/www/html/storage
        networks:
            - dental
        depends_on:
            dental.pgsql:
                condition: service_healthy
        restart: unless-stopped

    dental.worker:
        image: dental-commissions/app:easypanel-8.4
        command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            APP_NAME: '${APP_NAME:-Dental Commissions MVP}'
            APP_ENV: '${APP_ENV:-production}'
            APP_KEY: '${APP_KEY:?APP_KEY is required}'
            APP_DEBUG: '${APP_DEBUG:-false}'
            APP_URL: '${APP_URL:?APP_URL is required}'
            APP_LOCALE: '${APP_LOCALE:-es}'
            APP_FALLBACK_LOCALE: '${APP_FALLBACK_LOCALE:-en}'
            LOG_CHANNEL: '${LOG_CHANNEL:-stack}'
            LOG_STACK: '${LOG_STACK:-single}'
            LOG_LEVEL: '${LOG_LEVEL:-info}'
            DB_CONNECTION: pgsql
            DB_HOST: '${DB_HOST:-dental.pgsql}'
            DB_PORT: '${DB_PORT:-5432}'
            DB_DATABASE: '${DB_DATABASE:-dental_commissions_mvp}'
            DB_USERNAME: '${DB_USERNAME:-dental}'
            DB_PASSWORD: '${DB_PASSWORD:?DB_PASSWORD is required}'
            SESSION_DRIVER: '${SESSION_DRIVER:-database}'
            CACHE_STORE: '${CACHE_STORE:-database}'
            QUEUE_CONNECTION: '${QUEUE_CONNECTION:-database}'
            WHATSAPP_API_URL: '${WHATSAPP_API_URL:-https://graph.facebook.com/v19.0}'
            WHATSAPP_PHONE_NUMBER_ID: '${WHATSAPP_PHONE_NUMBER_ID:?WHATSAPP_PHONE_NUMBER_ID is required}'
            WHATSAPP_ACCESS_TOKEN: '${WHATSAPP_ACCESS_TOKEN:?WHATSAPP_ACCESS_TOKEN is required}'
            WHATSAPP_VERIFY_TOKEN: '${WHATSAPP_VERIFY_TOKEN:?WHATSAPP_VERIFY_TOKEN is required}'
            WHATSAPP_APP_SECRET: '${WHATSAPP_APP_SECRET:?WHATSAPP_APP_SECRET is required}'
            OPENAI_API_KEY: '${OPENAI_API_KEY:?OPENAI_API_KEY is required}'
            OPENAI_MODEL: '${OPENAI_MODEL:-gpt-4o-mini}'
        volumes:
            - dental-storage:/var/www/html/storage
        networks:
            - dental
        depends_on:
            dental.pgsql:
                condition: service_healthy
        restart: unless-stopped

    dental.pgsql:
        image: postgres:16-alpine
        environment:
            PGPASSWORD: '${DB_PASSWORD:?DB_PASSWORD is required}'
            POSTGRES_DB: '${DB_DATABASE:-dental_commissions_mvp}'
            POSTGRES_USER: '${DB_USERNAME:-dental}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:?DB_PASSWORD is required}'
            POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
            TZ: UTC
        volumes:
            - dental-pgsql:/var/lib/postgresql/data
        networks:
            - dental
        healthcheck:
            test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE:-dental_commissions_mvp}', '-U', '${DB_USERNAME:-dental}']
            retries: 5
            timeout: 5s
        restart: unless-stopped

networks:
    dental:
        driver: bridge

volumes:
    dental-pgsql:
        driver: local
    dental-storage:
        driver: local
